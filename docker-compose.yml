name: re-news

services:
  db:
    image: postgres:16-alpine
    container_name: renews_db
    environment:
      POSTGRES_DB: newsletter
      POSTGRES_USER: newsletter
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U newsletter -d newsletter"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [renews_net]
    mem_limit: 512m
    cpus: 0.5
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: packages/web/Dockerfile
    container_name: renews_web
    depends_on:
      db: { condition: service_healthy }
    environment:
      DATABASE_URL: postgres://newsletter:${DB_PASSWORD}@db:5432/newsletter
      SESSION_PASSWORD: ${SESSION_PASSWORD}
      APP_VERSION: dev
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
    ports:
      - "3100:3000"
    volumes:
      - ./data:/app/data:ro
      # Inherit host timezone so Node's Date, Intl, and cron-parser agree
      # with node-cron running in the worker and with the user's wall clock.
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    networks: [renews_net]
    mem_limit: 512m
    cpus: 1.0
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: packages/worker/Dockerfile
    container_name: renews_worker
    depends_on:
      db: { condition: service_healthy }
    environment:
      DATABASE_URL: postgres://newsletter:${DB_PASSWORD}@db:5432/newsletter
      CLAUDE_CODE_USE_SUBSCRIPTION: "1"
    volumes:
      - ${HOME}/.claude:/root/.claude
      - ./data:/app/data
      # node-cron fires in the container's local TZ — mount the host's so
      # "0 8 * * *" fires at 08:00 local wall clock, not 08:00 UTC.
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    networks: [renews_net]
    mem_limit: 3g
    cpus: 2.0
    restart: unless-stopped

networks:
  renews_net:
    driver: bridge
    name: renews_net
